general {
    hide_cursor = true
    grace = 0
}

input {
    kb_layout = us
    kb_options =
}

background {
    monitor =
    path = /home/kat/Pictures/Wallpapers/zerochan_4672774.jpg
    blur_size = 7
    blur_passes = 3
    brightness = 0.6
    contrast = 1.0
    vibrancy = 0.2
}

input-field {
    monitor =
    size = 280, 52
    outline_thickness = 2
    dots_size = 0.28
    dots_spacing = 0.2
    dots_center = true
    outer_color = rgba(afc6ffcc)
    inner_color = rgba(e2e2e988)
    font_color = rgba(e2e2e9ff)
    fade_on_empty = true
    placeholder_text = <span foreground="##dee4e0aa">󰌾  Пароль...</span>
    hide_input = false
    rounding = 12
    check_color = rgba(e2e2e9ff)
    fail_color = rgba(e2e2e9ff)
    fail_text = <i>$FAIL <b>($ATTEMPTS)</b></i>
    capslock_color = rgba(e2e2e9ff)
    position = 0, -100
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:1000] echo "$(date +'%H:%M')"
    color = rgba(e2e2e9ff)
    font_size = 72
    font_family = JetBrainsMono Nerd Font Mono
    position = 0, 180
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:60000] echo "$(date +'%A, %d %B')"
    color = rgba(afc6ffcc)
    font_size = 18
    font_family = JetBrainsMono Nerd Font Mono
    position = 0, 90
    halign = center
    valign = center
}

# Текущий трек
label {
    monitor =
    text = cmd[update:2000] $HOME/.config/hypr/scripts/hyprlock-media.sh
    color = rgba(afc6ffcc)
    font_size = 13
    font_family = JetBrainsMono Nerd Font Mono
    position = 0, -175
    halign = center
    valign = center
}
