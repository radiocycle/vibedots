format = """
[╭─](bold 238) $os$directory$git_branch$git_status$python$nodejs$rust$golang$cmd_duration$time
[╰─](bold 238)$character"""

right_format = """"""

add_newline = true

[os]
disabled = false
format = "[$symbol](bold cyan) "

[os.symbols]
Arch = " "

[directory]
style = "bold cyan"
read_only = " 󰌾"
truncation_length = 3
truncate_to_repo = true
format = "[$path]($style)[$read_only](red) "

[git_branch]
symbol = " "
style = "bold purple"
format = "[$symbol$branch]($style) "
truncation_length = 20

[git_status]
style = "yellow"
format = '([$all_status$ahead_behind]($style) )'
ahead = "⇡$count"
behind = "⇣$count"
diverged = "⇕⇡$ahead_count⇣$behind_count"
modified = "!$count"
untracked = "?$count"
staged = "+$count"
deleted = "✘$count"
stashed = "󰏗 "

[python]
symbol = " "
style = "yellow"
format = "[$symbol($version) ]($style)"

[nodejs]
symbol = " "
style = "green"
format = "[$symbol($version) ]($style)"

[rust]
symbol = " "
style = "208"
format = "[$symbol($version) ]($style)"

[golang]
symbol = " "
style = "cyan"
format = "[$symbol($version) ]($style)"

[cmd_duration]
min_time = 2000
style = "dimmed yellow"
format = "[󱦟 $duration]($style) "

[character]
success_symbol = "[❯](bold green)"
error_symbol = "[❯](bold red)"
vimcmd_symbol = "[❮](bold cyan)"

[status]
disabled = false
style = "red"
format = "[$symbol$status]($style) "
symbol = "✗ "
success_symbol = ""
not_found_symbol = "󰍉 "
sigint_symbol = "󰂭 "

[time]
disabled = false
style = "dimmed white"
format = "[$time]($style)"
time_format = "%H:%M"
