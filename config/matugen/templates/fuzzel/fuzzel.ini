[main]
font=JetBrainsMono Nerd Font Mono:size=14
terminal=foot
prompt=
layer=overlay
lines=12
width=55
dpi-aware=no
inner-pad=10
horizontal-pad=20
vertical-pad=12
match-counter=yes
icons-enabled=yes
icon-theme=Papirus-Dark

[colors]
background={{colors.surface_container_high.default.hex_stripped}}ee
text={{colors.on_surface.default.hex_stripped}}ff
prompt={{colors.primary.default.hex_stripped}}ff
placeholder={{colors.on_surface_variant.default.hex_stripped}}88
input={{colors.on_surface.default.hex_stripped}}ff
match={{colors.tertiary.default.hex_stripped}}ff
selection={{colors.primary_container.default.hex_stripped}}66
selection-text={{colors.on_surface.default.hex_stripped}}ff
selection-match={{colors.primary.default.hex_stripped}}ff
counter={{colors.on_surface_variant.default.hex_stripped}}ff
border={{colors.primary.default.hex_stripped}}aa

[border]
radius=10
width=2
